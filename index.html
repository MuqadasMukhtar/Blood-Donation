<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Smart Health</title>
    <link rel="stylesheet" href="index.css">
    
</head>
<body>

    <div class="signup-container">
        <div class="header">
            <div class="logo-icon">
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <h1>Create Account</h1>
            <p>Join Smart Health community today</p>
        </div>

        <form>
            <div class="input-group">
                <label>Full Name *</label>
                <div class="input-field">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" placeholder="Enter your full name" required>
                </div>
            </div>

            <div class="input-group">
                <label>Email Address *</label>
                <div class="input-field">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" placeholder="you@example.com" required>
                </div>
            </div>

            <div class="grid-2">
                <div class="input-group">
                    <label>Password *</label>
                    <div class="input-field">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="........" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Confirm Password *</label>
                    <div class="input-field">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="........" required>
                    </div>
                </div>
            </div>

            <div class="grid-2">
                <div class="input-group">
                    <label>Phone Number *</label>
                    <div class="input-field">
                        <i class="fa-solid fa-phone"></i>
                        <input type="tel" placeholder="+91 1234567890" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>City *</label>
                    <div class="input-field">
                        <i class="fa-solid fa-location-dot"></i>
                        <input type="text" placeholder="Your city" required>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label>Blood Group *</label>
                <div class="input-field">
                    <i class="fa-solid fa-droplet"></i>
                    <select required>
                        <option value="" disabled selected>Select blood group</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>
            </div>

            <label>Account Type *</label>
            <div class="account-type-grid">
                <input type="radio" name="acc-type" id="user" checked>
                <label for="user" class="type-card">
                    <i class="fa-solid fa-user"></i>
                    <div class="text">
                        <strong>User</strong>
                        <span>Regular account</span>
                    </div>
                </label>

                <input type="radio" name="acc-type" id="volunteer">
                <label for="volunteer" class="type-card">
                    <i class="fa-solid fa-user-group"></i>
                    <div class="text">
                        <strong>Volunteer</strong>
                        <span>Help others</span>
                    </div>
                </label>
            </div>

            <div class="terms">
                <input type="checkbox" id="terms" required>
                <label for="terms">I agree to the <span>Terms & Conditions</span> and <span>Privacy Policy</span></label>
            </div>

            <button type="submit" class="btn-primary">Create Account</button>

            <p class="login-link">Already have an account? <a href="login.html">Login here</a></p>
        </form>
    </div>

</body>
</html>
