<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Health</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="login-container">
        <div class="header">
            <div class="logo-icon">
                <i class="fa-solid fa-user-check"></i>
            </div>
            <h1>Welcome Back</h1>
            <p>Login to your Smart Health account</p>
        </div>

        <form>
            <div class="input-group">
                <label>Email Address</label>
                <div class="input-field">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" placeholder="you@example.com" required>
                </div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="input-field">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="........" required>
                </div>
            </div>

            <div class="login-options">
                <div class="remember-me">
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember me</label>
                </div>
                <a href="index.html" class="forgot-pass">Forgot password?</a>
            </div>

            <button type="submit" class="btn-primary">Login</button>

            <p class="register-link">Don't have an account? <a href="index.html">Register here</a></p>
        </form>
    </div>

</body>
</html>
